<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check List</title>
https://cdn.tailwindcss.com
</head>

<body class="bg-gray-100 min-h-screen font-sans">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- Header -->
<div class="text-center">
  <h1 class="text-2xl font-bold">🧺 Check List</h1>
  <p class="text-sm text-gray-500">ตรวจสอบรับ‑ส่งผ้า & การชำระเงิน</p>
</div>

<!-- Menu -->
<div id="menu" class="space-y-3">
  <button onclick="showForm()" class="w-full bg-green-500 text-white py-3 rounded-xl text-lg">✅ ยืนยันข้อมูลรับผ้า</button>
  <button onclick="showSearch()" class="w-full bg-blue-500 text-white py-3 rounded-xl text-lg">🔍 ตรวจสอบ Order</button>
</div>

<!-- Form -->
<div id="form" class="hidden bg-white p-4 rounded-xl shadow space-y-3">
  <h2 class="font-bold text-lg">ยืนยันข้อมูลรับผ้า</h2>

  <input id="name" placeholder="ชื่อลูกค้า" class="w-full p-2 border rounded">
  <input id="phone" placeholder="เบอร์โทร" class="w-full p-2 border rounded">
  <input id="qty" type="number" placeholder="จำนวนชิ้น" class="w-full p-2 border rounded">
  <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-2 border rounded">

  <select id="payment" class="w-full p-2 border rounded" onchange="toggleSlip()">
    <option value="เงินสด">เงินสด</option>
    <option value="โอนเงิน">โอนเงิน</option>
  </select>

  <label class="text-sm">รูปผ้า / ใบรับงาน (แนบหรือไม่แนบก็ได้)</label>
  <input id="workImage" type="file" accept="image/*">

  <div id="slipArea" class="hidden">
    <label class="text-sm">สลิปโอนเงิน *</label>
    <input id="slipImage" type="file" accept="image/*">
  </div>

  <button onclick="submitOrder()" class="w-full bg-indigo-500 text-white py-3 rounded-xl">
    บันทึกข้อมูล
  </button>

  <p id="result" class="text-center font-bold"></p>
  <button onclick="back()" class="w-full text-sm text-gray-500">← กลับ</button>
</div>

<!-- Search -->
<div id="search" class="hidden bg-white p-4 rounded-xl shadow space-y-3">
  <h2 class="font-bold text-lg">ตรวจสอบ Order</h2>

  <input id="searchPhone" placeholder="กรอกเบอร์โทร" class="w-full p-2 border rounded">
  <button onclick="searchOrder()" class="w-full bg-blue-500 text-white py-3 rounded-xl">ค้นหา</button>

  <div id="orders" class="space-y-2 text-sm"></div>
  <button onclick="back()" class="w-full text-sm text-gray-500">← กลับ</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyf19zeCtZMnZQ2ao53wjZotbOyzGFgyF33cfKa2xmyC2Y6SjECDXgJEt_f6LAMxpCA/exec"

function showForm(){
  menu.classList.add("hidden")
  form.classList.remove("hidden")
}

function showSearch(){
  menu.classList.add("hidden")
  search.classList.remove("hidden")
}

function back(){
  form.classList.add("hidden")
  search.classList.add("hidden")
  menu.classList.remove("hidden")
}

function toggleSlip(){
  slipArea.classList.toggle("hidden", payment.value !== "โอนเงิน")
}

async function submitOrder(){
  if(payment.value==="โอนเงิน" && !slipImage.files[0]){
    alert("กรุณาแนบสลิปโอนเงิน")
    return
  }

  const fd = new FormData()
  fd.append("name", name.value)
  fd.append("phone", phone.value)
  fd.append("qty", qty.value)
  fd.append("amount", amount.value)
  fd.append("payment", payment.value)
  if(workImage.files[0]) fd.append("work", workImage.files[0])
  if(slipImage.files[0]) fd.append("slip", slipImage.files[0])

  const res = await fetch(API_URL,{method:"POST",body:fd})
  const data = await res.json()

  result.innerHTML = "✅ บันทึกสำเร็จ<br>Order: " + data.orderId
}

async function searchOrder(){
  const res = await fetch(API_URL + "?phone=" + searchPhone.value)
  const data = await res.json()

  orders.innerHTML = data.map(o=>`
    <div class="border p-2 rounded">
      <b>${o.id}</b><br>
      ${o.qty} ชิ้น | ${o.amount} บาท | ${o.payment}<br>
      <a href="${o.work}" target="_.slip ? ` | <a href="${o.slip}" target="_</div>
  `).join("")
}
</script>

</body>
</html>
